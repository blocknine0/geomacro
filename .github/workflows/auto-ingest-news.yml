name: Auto Ingest News
# Runs at :00 every 2 hours — first step in the pipeline, so fresh events
# are in Supabase before sync-lifecycle/create-markets run afterward.
# Staggered against the other RPC-heavy workflows below to avoid multiple
# GitHub Actions runners hitting the same RPC/API endpoints at once.
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: {}
jobs:
  ingest-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install ethers @supabase/supabase-js groq-sdk node-fetch dotenv
      - name: Run news ingestion script
        env:
          SUPABASE_URL: ${{ secrets.APP_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/ingest-news.js
