name: Auto-resolve Agent Arena markets
# Runs at :30 every 2 hours — after create-markets (:10) and finalize-markets
# (:15), so it's not competing with them for RPC calls. Resolves any market
# that's at least 48 hours old (per resolution_at) with an AI verdict.
on:
  schedule:
    - cron: "30 */2 * * *"
  workflow_dispatch: {}
jobs:
  resolve-markets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install ethers @supabase/supabase-js groq-sdk node-fetch
      - name: Run market resolution script
        env:
          OWNER_PRIVATE_KEY: ${{ secrets.OWNER_PRIVATE_KEY }}
          APP_SUPABASE_URL: ${{ secrets.APP_SUPABASE_URL }}
          APP_SUPABASE_ANON_KEY: ${{ secrets.APP_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ARC_RPC_URL: ${{ secrets.ARC_RPC_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MAX_RESOLUTIONS_PER_RUN: "40"
          MAX_EVENTS_PER_RUN: "60"
        run: node scripts/resolve-markets.js
        
