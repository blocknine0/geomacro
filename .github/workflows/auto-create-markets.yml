name: Auto Create Markets
# Runs twice per 2-hour cycle: at :10 (after ingest + first lifecycle sync,
# so fresh events exist and "room" is accurate) and at :40 (right after
# finalize-markets + the second lifecycle sync free up completed slots —
# this is what makes "staking_closed -> completed" immediately free room
# for a new market within ~30 min instead of up to 2 hours).
on:
  schedule:
    - cron: "10,40 */2 * * *"
  workflow_dispatch: {}
concurrency:
  # Runs twice per 2h cycle (:10 and :40) — this prevents one run from
  # overlapping with a still-running previous one (e.g. a manual dispatch
  # colliding with the scheduled :40 run), which would otherwise race on the
  # same wallet nonce.
  group: auto-create-markets
  cancel-in-progress: true
jobs:
  create-markets:
    runs-on: ubuntu-latest
    # 🛡️ NEW: without this, GitHub Actions' default job timeout is 6 hours.
    # 10 min gives the script's own RUN_TIME_BUDGET_MS (6 min) headroom to
    # exit gracefully before a hard timeout cancels it mid-transaction.
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install ethers @supabase/supabase-js
      - name: Run market creation script
        env:
          OWNER_PRIVATE_KEY: ${{ secrets.OWNER_PRIVATE_KEY }}
          APP_SUPABASE_URL: ${{ secrets.APP_SUPABASE_URL }}
          APP_SUPABASE_ANON_KEY: ${{ secrets.APP_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ARC_RPC_URL: ${{ secrets.ARC_RPC_URL }}
          ARC_RPC_URL_2: ${{ secrets.ARC_RPC_URL_2 }}
          ARC_RPC_URL_3: ${{ secrets.ARC_RPC_URL_3 }}
          ARC_RPC_URL_4: ${{ secrets.ARC_RPC_URL_4 }}
          ARC_RPC_URL_5: ${{ secrets.ARC_RPC_URL_5 }}
          RUN_TIME_BUDGET_MS: "360000"
        run: node scripts/create-markets.js
