name: Sync Market Lifecycle
# Runs twice per 2-hour cycle: at :05 (right after ingest, before
# create-markets counts "room") and at :35 (right after finalize-markets
# frees up completed slots, so create-markets's next run at :40 sees
# accurate room). This replaces the old */30 schedule, which could
# collide with the RPC-heavy workflows below.
on:
  schedule:
    - cron: "5,35 */2 * * *"
  workflow_dispatch: {}
jobs:
  sync-lifecycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install ethers @supabase/supabase-js
      - name: Run lifecycle sync script
        env:
          APP_SUPABASE_URL: ${{ secrets.APP_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ARC_RPC_URL: ${{ secrets.ARC_RPC_URL }}
          SYNC_MAX_EVENTS_PER_RUN: "150"
        run: node scripts/sync-lifecycle.js
        
